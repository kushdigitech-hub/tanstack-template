<!doctype html>
<html lang="en">
  <body>
    <!-- Static Netlify form definitions for framework-rendered pages -->
    <form name="quick-service-request" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quick-service-request" />
      <input name="name" />
      <input name="phone" />
      <input name="service" />
      <input name="location" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
      <input name="subject" />
    </form>
  </body>
</html>
